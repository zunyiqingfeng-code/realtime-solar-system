<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>月球车 · Lunar Rover</title>
  <link rel="manifest" href="./manifest.json">
  <style>
    :root {
      color-scheme: dark;
      --bg: #04060d;
      --panel: rgba(10, 14, 28, 0.72);
      --panel-border: rgba(122, 162, 255, 0.22);
      --text: #e9efff;
      --text-dim: #8fa3c8;
      --accent: #6ea8ff;
      --accent2: #9f7bff;
      font-family: "PingFang SC", "Microsoft YaHei", "Segoe UI", system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); }
    canvas { display: block; }
    .glass {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      backdrop-filter: blur(16px) saturate(1.3);
      -webkit-backdrop-filter: blur(16px) saturate(1.3);
      box-shadow: 0 12px 40px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.05);
    }
    button {
      font-family: inherit; font-size: 12.5px; color: var(--text);
      background: rgba(70, 105, 180, 0.22); border: 1px solid rgba(130, 170, 255, 0.25);
      border-radius: 9px; padding: 6px 11px; cursor: pointer; transition: all .15s ease; white-space: nowrap;
    }
    button:hover { background: rgba(90, 135, 220, 0.4); border-color: rgba(150, 190, 255, 0.5); transform: translateY(-1px); }
    button.active {
      background: linear-gradient(135deg, rgba(110,168,255,.85), rgba(159,123,255,.85));
      border-color: transparent; color: #fff; font-weight: 600;
    }

    /* ---------- 出发面板 ---------- */
    #startOverlay {
      position: fixed; inset: 0; z-index: 60; display: flex; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at 50% 40%, #0a1226 0%, #04060d 72%);
    }
    #startCard { width: min(680px, 92vw); padding: 26px 28px; display: flex; flex-direction: column; gap: 16px; }
    #startCard h1 { margin: 0; font-size: 24px; letter-spacing: .18em;
      background: linear-gradient(90deg, #cfe0ff, #9f7bff); -webkit-background-clip: text; background-clip: text; color: transparent; }
    #startCard .sub { font-size: 12px; color: var(--text-dim); margin-top: -10px; }
    #startCard .gtitle { font-size: 11px; color: var(--text-dim); letter-spacing: .2em; }
    .regionGrid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .regionGrid button { text-align: left; padding: 12px 14px; border-radius: 12px; display: flex; flex-direction: column; gap: 4px; }
    .regionGrid b { font-size: 14px; }
    .regionGrid span { font-size: 11px; color: var(--text-dim); white-space: normal; line-height: 1.5; }
    .regionGrid button.active span { color: rgba(255,255,255,.85); }
    .roverRow { display: flex; gap: 10px; }
    .roverRow button { flex: 1; padding: 10px; border-radius: 12px; }
    #goBtn { font-size: 15px; padding: 12px; border-radius: 12px; font-weight: 600; letter-spacing: .2em; }
    #loadingText { font-size: 12px; color: var(--text-dim); text-align: center; display: none; }
    #backRow { text-align: center; }
    #backRow a { color: var(--text-dim); font-size: 12px; text-decoration: none; }
    #backRow a:hover { color: var(--text); }

    /* ---------- HUD ---------- */
    #topBar {
      position: fixed; top: 14px; left: 50%; transform: translateX(-50%); z-index: 10;
      display: none; align-items: center; gap: 16px; padding: 10px 18px; font-variant-numeric: tabular-nums;
    }
    #topBar .big { font-size: 20px; font-weight: 700; }
    #topBar .unit { font-size: 11px; color: var(--text-dim); }
    #topBar .divider { width: 1px; height: 26px; background: rgba(130,170,255,.18); }
    #topBar .kv { display: flex; flex-direction: column; align-items: center; }
    #topBar .kv b { font-size: 14px; font-weight: 600; }
    #topBar .kv span { font-size: 10px; color: var(--text-dim); }

    #checkPanel {
      position: fixed; left: 16px; top: 16px; z-index: 10; width: 250px; padding: 14px 16px;
      display: none; flex-direction: column; gap: 8px;
    }
    #checkPanel .stitle { font-size: 11px; color: var(--text-dim); letter-spacing: .18em;
      border-bottom: 1px solid rgba(130,170,255,.14); padding-bottom: 5px; }
    #checkList { display: flex; flex-direction: column; gap: 6px; font-size: 12px; }
    #checkList .ck { display: flex; justify-content: space-between; gap: 8px; color: var(--text-dim); }
    #checkList .ck.done { color: #7be0a8; }
    #checkList .ck b { font-weight: 500; }
    #checkList .ck .dist { font-variant-numeric: tabular-nums; }
    #regionName { font-size: 15px; font-weight: 700; }
    #switchRow { display: flex; gap: 6px; }
    #switchRow button { flex: 1; font-size: 11px; padding: 5px; }

    #miniWrap { position: fixed; right: 16px; top: 16px; z-index: 10; padding: 10px; display: none; }
    #minimap { display: block; border-radius: 8px; }
    #miniWrap .cap { font-size: 10px; color: var(--text-dim); text-align: center; margin-top: 6px; letter-spacing: .15em; }

    #helpBar {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); z-index: 10;
      display: none; padding: 8px 16px; font-size: 11.5px; color: var(--text-dim);
    }
    #helpBar kbd {
      background: rgba(120,160,255,.15); border: 1px solid rgba(130,170,255,.3); border-radius: 4px;
      padding: 0 5px; font-size: 10.5px; font-family: inherit;
    }

    #toast {
      position: fixed; top: 20%; left: 50%; transform: translateX(-50%) scale(0.9); z-index: 30;
      padding: 14px 26px; font-size: 16px; font-weight: 600; opacity: 0; pointer-events: none;
      transition: all .35s ease; text-align: center;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) scale(1); }
    body.photo #topBar, body.photo #checkPanel, body.photo #miniWrap, body.photo #helpBar, body.photo #mgCard { display: none !important; }
    body.photo #mSnapBar { display: flex !important; }
    #toast .sub { font-size: 11.5px; color: var(--text-dim); font-weight: 400; margin-top: 4px; }
  </style>
</head>
<body>
  <div id="startOverlay">
    <div id="startCard" class="glass">
      <h1>月球车 · LUNAR ROVER</h1>
      <div class="sub">真实月面高程 × 1/6 重力驾驶 × 地标打卡 —— 与实时太阳系同一数据脊柱</div>
      <div class="gtitle">选择着陆区</div>
      <div class="regionGrid" id="regionGrid"></div>
      <div class="gtitle">选择月球车</div>
      <div class="roverRow" id="roverRow"></div>
      <button id="goBtn">出 发</button>
      <div id="loadingText">正在生成月面地形…</div>
      <div id="backRow"><a href="index.html">← 返回实时太阳系</a></div>
    </div>
  </div>

  <div id="topBar" class="glass">
    <div class="kv"><b class="big" id="hudSpeed">0.0</b><span>km/h</span></div>
    <div class="divider"></div>
    <div class="kv"><b id="hudSlope">0°</b><span>坡度</span></div>
    <div class="kv"><b id="hudOdo">0 m</b><span>里程</span></div>
    <div class="kv"><b id="hudAlt">0 m</b><span>高程</span></div>
    <div class="divider"></div>
    <button id="mPhotoBtn" title="摄影模式: 隐藏界面 (P)">摄影</button>
    <button id="exitBtn" title="返回太阳系">返回太阳系</button>
  </div>

  <div id="checkPanel" class="glass">
    <div id="regionName">—</div>
    <div class="stitle">地标打卡</div>
    <div id="checkList"></div>
    <div class="stitle">月球车</div>
    <div id="switchRow"></div>
  </div>

  <div id="miniWrap" class="glass">
    <canvas id="minimap" width="230" height="230"></canvas>
    <div class="cap" id="miniCap">雷达地图 · 2D</div>
  </div>

  <div id="helpBar" class="glass">
    <kbd>W</kbd><kbd>S</kbd> 前进/倒车 · <kbd>A</kbd><kbd>D</kbd> 转向 · <kbd>Shift</kbd> 加速 · <kbd>空格</kbd> 手刹 · <kbd>R</kbd> 换车 · 拖拽/滚轮调整视角
  </div>

  <div id="mSnapBar" class="glass" style="position:fixed;right:16px;bottom:16px;z-index:70;display:none;gap:8px;padding:10px 12px">
    <button id="mSnapBtn">快门 · 存图</button>
    <button id="mPhotoExit">退出摄影 (Esc)</button>
  </div>

  <div id="toast" class="glass"></div>

  <div id="mgCard" class="glass" style="position:fixed;left:50%;bottom:72px;transform:translateX(-50%);z-index:40;width:min(420px,90vw);padding:14px 17px;display:none;flex-direction:column;gap:8px">
    <b id="mgTitle" style="font-size:13.5px"></b>
    <div id="mgText" style="font-size:12px;color:var(--text-dim);line-height:1.7"></div>
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span id="mgDots" style="font-size:10px;color:var(--text-dim)"></span>
      <div style="display:flex;gap:7px">
        <button id="mgSkip" style="background:transparent;border-color:transparent;color:var(--text-dim)">跳过</button>
        <button id="mgNext">下一条</button>
      </div>
    </div>
  </div>

  <script src="./vendor/three-bundle.min.js"></script>
  <script src="./assets_textures.js?v=50"></script>
  <script src="./star_catalog.js?v=50"></script>
  <script src="./moon.js?v=50"></script>
  <script>if ("serviceWorker" in navigator && location.protocol.indexOf("http") === 0) navigator.serviceWorker.register("./sw.js").catch(function () {});</script>
</body>
</html>
