<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="地面观星模式:站在地球表面看天空的离线天文馆。真实历表驱动的太阳/月亮/行星/恒星地平视角, 月相圆缺与日食全过程呈现。">
  <meta name="theme-color" content="#04060d">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='26' r='11' fill='%23f6f3ea'/%3E%3Cpath d='M4 52 L18 38 L28 48 L40 34 L52 46 L60 40 L60 60 L4 60 Z' fill='%236ea8ff'/%3E%3C/svg%3E">
  <title>地面观星 · 实时太阳系</title>
  <link rel="manifest" href="./manifest.json">
  <style>
    :root {
      color-scheme: dark;
      --bg: #04060d;
      --panel: rgba(10, 14, 28, 0.72);
      --panel-border: rgba(122, 162, 255, 0.22);
      --text: #e9efff;
      --text-dim: #8fa3c8;
      --accent: #6ea8ff;
      --accent2: #9f7bff;
      font-family: "PingFang SC", "Microsoft YaHei", "Segoe UI", system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); }
    canvas { display: block; }
    #skyCanvas { position: fixed; inset: 0; cursor: grab; touch-action: none; }
    #skyCanvas:active { cursor: grabbing; }

    /* ---------- 通用玻璃面板(与主站一致) ---------- */
    .glass {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      backdrop-filter: blur(16px) saturate(1.3);
      -webkit-backdrop-filter: blur(16px) saturate(1.3);
      box-shadow: 0 12px 40px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.05);
    }
    button {
      font-family: inherit; font-size: 12.5px; color: var(--text);
      background: rgba(70, 105, 180, 0.22); border: 1px solid rgba(130, 170, 255, 0.25);
      border-radius: 9px; padding: 6px 11px; cursor: pointer; transition: all .15s ease; white-space: nowrap;
    }
    button:hover { background: rgba(90, 135, 220, 0.4); border-color: rgba(150, 190, 255, 0.5); transform: translateY(-1px); }
    button.active {
      background: linear-gradient(135deg, rgba(110,168,255,.85), rgba(159,123,255,.85));
      border-color: transparent; color: #fff; font-weight: 600;
    }
    input[type="number"], input[type="datetime-local"] {
      font-family: inherit; font-size: 12.5px; color: var(--text);
      background: rgba(20, 30, 58, 0.65); border: 1px solid rgba(130, 170, 255, 0.25);
      border-radius: 8px; padding: 5px 8px; outline: none; width: 100%;
    }
    input[type="number"]:focus { border-color: rgba(150, 190, 255, 0.55); }

    /* ---------- 标签覆盖层(DOM, 保证文字锐利) ---------- */
    #labels { position: fixed; inset: 0; z-index: 4; pointer-events: none; overflow: hidden; }
    #labels .lbl {
      position: absolute; left: 0; top: 0; white-space: nowrap; will-change: transform;
      text-shadow: 0 1px 4px rgba(0,0,0,.85), 0 0 2px rgba(0,0,0,.6);
    }
    #labels .st { font-size: 10.5px; color: #b9c8ea; opacity: .88; }
    #labels .pl { font-size: 11.5px; font-weight: 600; color: #ffd9a0; }
    #labels .sm { font-size: 12px; font-weight: 600; color: #ffe9b8; }

    /* ---------- 顶部时间栏 ---------- */
    #timeBar {
      position: fixed; top: 14px; left: 50%; transform: translateX(-50%); z-index: 10;
      display: flex; align-items: center; gap: 10px; padding: 9px 16px; flex-wrap: wrap; justify-content: center;
      max-width: min(96vw, 860px);
    }
    #dateWrap { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
    #dateText { font-size: 17px; font-weight: 600; font-variant-numeric: tabular-nums; letter-spacing: .04em; }
    #jdText { font-size: 10.5px; color: var(--text-dim); font-variant-numeric: tabular-nums; }
    #dtInput { display: none; width: auto; margin-left: 6px; }
    .tgroup { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; justify-content: center; }
    .divider { width: 1px; height: 26px; background: rgba(130,170,255,.18); }

    /* ---------- 日食徽标 ---------- */
    #eclipseBadge {
      display: none; position: fixed; top: 76px; left: 50%; transform: translateX(-50%); z-index: 10;
      padding: 7px 16px; font-size: 13px; font-weight: 600; letter-spacing: .06em;
      color: #ffe9b8; border-color: rgba(255, 210, 130, 0.45);
    }

    /* ---------- 返回 + 面板 ---------- */
    #backLink {
      position: fixed; left: 16px; top: 16px; z-index: 11; display: inline-block;
      padding: 8px 14px; font-size: 13px; color: var(--text); text-decoration: none;
    }
    #backLink:hover { border-color: rgba(150,190,255,.5); }
    #panelToggle { position: fixed; left: 16px; top: 58px; z-index: 11; }
    #panel {
      position: fixed; left: 16px; top: 100px; z-index: 10; width: 252px;
      max-height: calc(100vh - 130px); overflow-y: auto;
      padding: 16px 14px; display: flex; flex-direction: column; gap: 13px;
      scrollbar-width: thin; scrollbar-color: rgba(120,160,255,.3) transparent;
      transition: transform .35s cubic-bezier(.4,0,.2,1), opacity .3s;
    }
    #panel.collapsed { transform: translateX(-300px); opacity: 0; pointer-events: none; }
    #panel h1 {
      margin: 0; font-size: 17px; letter-spacing: .12em; font-weight: 700;
      background: linear-gradient(90deg, #cfe0ff, #9f7bff);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    #panel .subtitle { font-size: 11px; color: var(--text-dim); margin-top: -8px; letter-spacing: .05em; }
    .section { display: flex; flex-direction: column; gap: 8px; }
    .section > .stitle {
      font-size: 11px; color: var(--text-dim); letter-spacing: .18em; text-transform: uppercase;
      border-bottom: 1px solid rgba(130,170,255,.14); padding-bottom: 5px;
    }
    #presetWrap { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
    #presetWrap button { padding: 6px 2px; font-size: 12px; }
    .lrow { display: flex; gap: 6px; align-items: center; }
    .lrow label { font-size: 11.5px; color: var(--text-dim); flex: none; width: 34px; }
    #locName { font-size: 11.5px; color: var(--accent); letter-spacing: .03em; }
    .chk { display: flex; align-items: center; gap: 8px; font-size: 12.5px; cursor: pointer; }
    .chk input { accent-color: var(--accent); width: 14px; height: 14px; cursor: pointer; }
    .stat { display: flex; justify-content: space-between; font-size: 12px; }
    .stat .k { color: var(--text-dim); }
    .stat .v { font-variant-numeric: tabular-nums; }

    /* ---------- 底部提示 ---------- */
    #hint {
      position: fixed; right: 16px; bottom: 16px; z-index: 10;
      padding: 8px 14px; font-size: 11.5px; color: var(--text-dim); letter-spacing: .04em;
      display: flex; gap: 10px; align-items: center;
    }
    #fovText { color: var(--text); font-variant-numeric: tabular-nums; }

    @media (max-width: 760px) {
      #dateText { font-size: 14px; }
      #timeBar { top: 8px; gap: 6px; padding: 7px 10px; }
      #panel { width: 228px; top: 96px; }
      #hint { display: none; }
      #eclipseBadge { top: 108px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <canvas id="skyCanvas"></canvas>
  <div id="labels"></div>

  <a id="backLink" class="glass" href="index.html">← 返回太阳系</a>
  <button id="panelToggle" class="glass">☰ 面板</button>

  <div id="timeBar" class="glass">
    <div id="dateWrap" title="点击手动设置日期时间">
      <div id="dateText">----</div>
      <div id="jdText">JD</div>
    </div>
    <input id="dtInput" type="datetime-local">
    <div class="divider"></div>
    <div class="tgroup">
      <button data-v="-86400">-1天</button>
      <button data-v="-3600">-1时</button>
      <button data-v="-60">-1分</button>
      <button data-v="0">暂停</button>
      <button data-v="real">实时</button>
      <button data-v="60">+1分</button>
      <button data-v="3600">+1时</button>
      <button data-v="86400">+1天</button>
    </div>
    <div class="divider"></div>
    <button id="btnNow">此刻</button>
  </div>

  <div id="eclipseBadge" class="glass"></div>

  <div id="panel" class="glass">
    <h1>地面观星</h1>
    <div class="subtitle">站在地球表面 · 天文馆视角</div>

    <div class="section">
      <div class="stitle">观测地点</div>
      <div id="presetWrap"></div>
      <div class="lrow"><label>纬度</label><input id="latInput" type="number" step="0.01" min="-89.9" max="89.9"></div>
      <div class="lrow"><label>经度</label><input id="lonInput" type="number" step="0.01" min="-180" max="180"></div>
      <div class="lrow"><button id="btnApplyLoc" style="flex:1">应用经纬度</button></div>
      <div id="locName"></div>
    </div>

    <div class="section">
      <div class="stitle">显示</div>
      <label class="chk"><input id="chkLines" type="checkbox" checked>星座连线</label>
      <label class="chk"><input id="chkNames" type="checkbox" checked>星名标签</label>
      <label class="chk"><input id="chkRefr" type="checkbox" checked>大气折射</label>
    </div>

    <div class="section">
      <div class="stitle">此刻天空</div>
      <div class="stat"><span class="k">地方恒星时</span><span class="v" id="stLst">--</span></div>
      <div class="stat"><span class="k">太阳 高度/方位</span><span class="v" id="stSun">--</span></div>
      <div class="stat"><span class="k">月亮 高度/方位</span><span class="v" id="stMoon">--</span></div>
      <div class="stat"><span class="k">月相照亮</span><span class="v" id="stPhase">--</span></div>
      <div class="stat"><span class="k">日月角距</span><span class="v" id="stSep">--</span></div>
    </div>

    <div class="section">
      <div class="stitle">天象速览</div>
      <button id="btnEclipse2035">2035·09·02 北京日全食</button>
    </div>
  </div>

  <div id="hint" class="glass"><span>拖拽转动视角 · 滚轮缩放</span><span id="fovText">视场 70°</span></div>

  <script src="solar_system_data.js?v=51"></script>
  <script src="star_catalog.js?v=51"></script>
  <script src="star_names.js?v=51"></script>
  <script src="constellations.js?v=51"></script>
  <script src="sky.js?v=51"></script>
  <script>if ("serviceWorker" in navigator && location.protocol.indexOf("http") === 0) navigator.serviceWorker.register("./sw.js").catch(function () {});</script>
</body>
</html>
